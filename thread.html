<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/thread.css" />
  </head>

  <body>
    <div class="container-fluid vh-100 d-flex flex-column p-0">
      
      <!-- header -->
      <header id="header-container" class="header-custom text-white p-3 d-flex align-items-center">
        <div id="back-btn" class="me-3">←</div>
      </header>

      <!-- chatbox -->
      <div
        id="chatbox-container" class="chatbox-custom-bg flex-grow-1 overflow-auto p-3 d-flex flex-column gap-2"
      >
      </div>

      <!-- chat features -->
      <footer class="footer-custom p-2">

        <!-- chat flexbox-->
        <div class="d-flex align-items-center gap-2">

          <!-- photo icon-->
          <button id="camera-btn" class="icon-btn">
            <img src="./images/chat_icons/camera.png" alt="Camera" class="icon-img" />
          </button>

          <!-- mic icon-->
          <button id="mic-btn" class="icon-btn">
            <img src="./images/chat_icons/mic.png" alt="a mic" class="icon-img" />
          </button>
          
          <!-- message box-->
          <input
            type="text"
            id="messageInput"
            class="form-control rounded-pill"
            placeholder="Message"
            autocomplete="off"
          />

          <!--send icon-->
          <button id="send-btn" class="icon-btn">
            <img src="./images/chat_icons/send.png" alt="The button to submit message" class="icon-img"/>
          </button>
        </div>
      </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/thread.js"></script>
  </body>
</html>
