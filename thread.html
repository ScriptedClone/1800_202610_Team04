<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/thread.css" />
  </head>

  <body>
    <div class="container-fluid vh-100 d-flex flex-column p-0">
      <!-- header -->
      <header class="header-custom text-white p-3 d-flex align-items-center">
        <div class="me-3">←</div>
        <img
          src="./images/Canada Flag.png"
          alt="Canada flag"
          class="header-icon-custom me-3"
        />
        <div>
          <div class="fw-bold fs-5">Canada vs Croatia</div>
          <small>October 1, 2026</small>
        </div>
      </header>

      <!-- chatbox -->
      <div
        class="chatbox-custom-bg flex-grow-1 overflow-auto p-3 d-flex flex-column gap-2"
      >
        <div class="d-flex justify-content-start gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">Hey is anyone going to the game tomorrow</p>
        </div>

        <div class="d-flex flex-row-reverse gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">
            I'm going too! I wonder who else is going tomorrow
          </p>
        </div>

        <div class="d-flex justify-content-start gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">
            That sounds great! Is there anyone else who wants to come?
          </p>
        </div>

        <div class="d-flex justify-content-start gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">
            I'm really looking forward to tomorrow's match.
          </p>
        </div>

        <div class="d-flex flex-row-reverse gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">Me too</p>
        </div>
        <div class="d-flex flex-row-reverse gap-3 align-items-center">
          <img src="./images/account.png" class="chat-icon" />
          <p class="chat-bubble">I am definitely going tomorrow!</p>
        </div>
      </div>

      <!-- chat features -->
      <footer class="footer-custom p-2">
        <!-- chat flexbox-->
        <div class="d-flex align-items-center gap-2">
          <!-- message box-->
          <input
            type="text"
            class="form-control rounded-pill"
            placeholder="Message"
          />

          <!-- photo icon-->
          <button class="icon-btn">
            <img src="./images/camera.png" alt="Camera" class="icon-img" />
          </button>
          <!-- voice icon-->
          <button class="icon-btn">
            <img src="./images/mic.png" alt="Mic" class="icon-img" />
          </button>
        </div>

        <!-- send photos-->
      </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
