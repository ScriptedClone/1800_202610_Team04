<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Other libraries go here -->
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- Stuff for body goes here -->
    <nav class="navbar navbar-custom">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="header-icon-link" href="#">
          <img class="header-icon" src="./images/menu.png" alt="Menu" width="36" height="36" />
        </a>
        <a class="header-icon-link" href="#">
          <img class="header-icon" src="./images/account.png" alt="Profile" width="36" height="36" />
        </a>
      </div>
    </nav>

    <main class="hero-screen">
      <img class="hero-bg-image" src="./images/crowd.png" alt="" aria-hidden="true" />
      <section class="hero-content">
        <h1>Your side of the stadium.</h1>
        <p>
          Get together with fans and supporters from your country and cheer your
          team on as one.
        </p>
        <a class="hero-cta" href="#">Find your squad</a>

        <div class="hero-stats">
          <div class="stat-item">
            <img src="./images/users.png" alt="Users online icon" />
            <span>400 users online</span>
          </div>
          <div class="stat-item">
            <img src="./images/globe.png" alt="Nationalities icon" />
            <span>12 different nationalities</span>
          </div>
        </div>
      </section>
    </main>

    <!--Footer Icons and Buttons-->
    <div class="fixed-bottom">
      <footer class="app-footer navbar-custom">

        <!--Home Icon | home.png-->
        <a class="footer-icon-link" href="#" aria-label="Explore">
          <img class="footer-icon" src="images/home.png" alt="Profile icon">
        </a>

        <!--Chat Icon | chat.png-->
        <a class="footer-icon-link" href="#" aria-label="Saved">
          <img class="footer-icon" src="images/chat.png" alt="Profile icon">
        </a>

        <!--Account Icon | user.png-->
        <a class="footer-icon-link" href="#" aria-label="Profile">
          <img class="footer-icon" src="images/user.png" alt="Profile icon">
        </a>
      </footer>
    </div>
    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
