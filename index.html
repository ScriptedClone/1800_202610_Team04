<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <header class="header header-custom">
      <div class="container-fluid d-flex text-white justify-content-center align-items-center">
        <h1 class="display-4 my-3">FIFA SQUAD</h1>
      </div>
    </header>

    <main class="hero-screen">
      <img class="hero-bg-image" src="./images/crowd.png" alt="" aria-hidden="true" />
      <section class="hero-content">
        <h1>Your side of the stadium.</h1>
        <p>
          Get together with fans and supporters from your country and cheer your
          team on as a squad.
        </p>
        <a class="hero-cta" href="login.html">Find your squad</a>

        <div class="hero-stats">
          <div class="stat-item">
            <img src="./images/users.png" alt="Users online icon" />
            <span>400 users online</span>
          </div>
          <div class="stat-item">
            <img src="./images/globe.png" alt="Nationalities icon" />
            <span>6 different nationalities</span>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
