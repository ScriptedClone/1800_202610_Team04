<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/game-selection.css" />
  </head>

  <body>
    <nav class="navbar navbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <a class="header-icon-link" href="#">
          <img
            class="header-icon"
            src="./images/menu.png"
            alt="Menu"
            width="36"
            height="36"
          />
        </a>
        <h1 class="display-4 text-white"><span id="name-goes-here"></span></h1>
        <a class="header-icon-link" href="#">
          <img
            class="header-icon"
            src="./images/account.png"
            alt="Profile"
            width="36"
            height="36"
          />
        </a>
      </div>
    </nav>

    <!--content container-->
    <div class="d-flex flex-column align-items-center text-white flex-grow-1">
      <!--header-->
      <div class="background-custom display-4 p-3 mt-5">Select a match</div>

      <!--match list-->
      <div class="d-flex flex-column w-90 mx-auto">
        <!--match 1-->
        <button
          id="CA-QA-btn"
          class="d-flex flex-grow-1 background-custom justify-content-between align-items-center mt-5 match-btn text-white"
        >
          <img
            src="/images/region_selection/canada.png"
            class="flag-img-custom p-2"
          />
          <div id="CA-QA" class="d-flex flex-column"></div>
          <img
            src="/images/region_selection/qatar.png"
            class="flag-img-custom p-2"
          />
        </button>

        <!--match 2-->
        <button
          id="NZ-EG-btn"
          class="d-flex flex-grow-1 background-custom justify-content-between align-items-center mt-5 match-btn text-white"
        >
          <img
            src="/images/region_selection/new-zealand.png"
            class="flag-img-custom p-2"
          />
          <div id="NZ-EG" class="d-flex flex-column"></div>
          <img
            src="/images/region_selection/Egypt.png"
            class="flag-img-custom p-2"
          />
        </button>

        <!--match 3-->
        <button
          id="CA-SW-btn"
          class="d-flex flex-grow-1 justify-content-between align-items-center background-custom mt-5 match-btn text-white"
        >
          <img
            src="/images/region_selection/canada.png"
            class="flag-img-custom p-2"
          />
          <div id="CA-SW" class="d-flex flex-column"></div>
          <img
            src="/images/region_selection/switzerland.png"
            class="flag-img-custom p-2"
          />
        </button>

        <!--match 4-->
        <button
          id="NZ-BG-btn"
          class="d-flex flex-grow-1 justify-content-between align-items-center background-custom mt-5 match-btn text-white"
        >
          <img
            src="/images/region_selection/new-zealand.png"
            class="flag-img-custom p-2"
          />
          <div id="NZ-BG" class="d-flex flex-column"></div>
          <img
            src="/images/region_selection/belgium.png"
            class="flag-img-custom p-2"
          />
        </button>
      </div>
    </div>

    <!--Footer Icons and Buttons-->
    <div class="fixed-bottom">
      <footer class="app-footer navbar-custom">
        <!--Home Icon | home.png-->
        <a class="footer-icon-link" href="#" aria-label="Explore">
          <img class="footer-icon" src="images/home.png" alt="Profile icon" />
        </a>

        <!--Chat Icon | chat.png-->
        <a class="footer-icon-link" href="#" aria-label="Saved">
          <img class="footer-icon" src="images/chat.png" alt="Profile icon" />
        </a>

        <!--Account Icon | user.png-->
        <a class="footer-icon-link" href="#" aria-label="Profile">
          <img class="footer-icon" src="images/user.png" alt="Profile icon" />
        </a>
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/game.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
