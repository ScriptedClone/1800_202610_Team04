<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/game-selection.css" />
  </head>

  <body>
    <header class="header header-custom">
      <div class="container-fluid d-flex text-white justify-content-center align-items-center">
        <h1 class="display-4 my-3">FIFA SQUAD</h1>
      </div>
    </header>

    <!--content container-->
    <div class="d-flex flex-column align-items-center text-white flex-grow-1">

      <!--header-->
      <div class="background-custom display-4 p-3 mt-5">
        Select a match
      </div>

      <!--match list-->
      <div class="d-flex flex-column w-90 mx-auto">
        
        <!--match 1-->
        <button id="CA-QA-btn"class="d-flex flex-grow-1 background-custom justify-content-between align-items-center mt-5 match-btn text-white">
          <img src="/images/country_icons/canada.png" class="flag-img-custom p-2">
          <div id="CA-QA" class="d-flex flex-column"></div>
          <img src="/images/country_icons/qatar.png" class="flag-img-custom p-2">
        </button>

        <!--match 2-->
        <button id="NZ-EG-btn" class="d-flex flex-grow-1 background-custom justify-content-between align-items-center mt-5 match-btn text-white">
          <img src="/images/country_icons/new-zealand.png" class="flag-img-custom p-2">
          <div id="NZ-EG" class="d-flex flex-column"></div>
          <img src="/images/country_icons/Egypt.png" class="flag-img-custom p-2">
        </button>

        <!--match 3-->
        <button id="CA-SW-btn" class="d-flex flex-grow-1 justify-content-between align-items-center background-custom mt-5 match-btn text-white">
          <img src="/images/country_icons/canada.png" class="flag-img-custom p-2">
          <div id="CA-SW" class="d-flex flex-column"></div>
          <img src="/images/country_icons/switzerland.png" class="flag-img-custom p-2">
        </button>

        <!--match 4-->
        <button id="NZ-BG-btn" class="d-flex flex-grow-1 justify-content-between align-items-center background-custom mt-5 match-btn text-white">
          <img src="/images/country_icons/new-zealand.png" class="flag-img-custom p-2">
          <div id="NZ-BG" class="d-flex flex-column"></div>
          <img src="/images/country_icons/belgium.png" class="flag-img-custom p-2">
        </button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/game.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
