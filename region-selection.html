<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/region-selection.css" />
  </head>

  <body>
    <!-- navbar -->
    <nav class="navbar navbar-custom">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <a class="header-icon-link" href="#">
          <img
            class="header-icon"
            src="./images/menu.png"
            alt="Menu"
            width="36"
            height="36"
          />
        </a>
        <h1 class="display-4 text-white"><span id="name-goes-here"></span></h1>
        <a class="header-icon-link" href="#">
          <img
            class="header-icon"
            src="./images/account.png"
            alt="Profile"
            width="36"
            height="36"
          />
        </a>
      </div>
    </nav>

    <!--content container-->
    <div class="d-flex flex-column align-items-center text-white flex-grow-1">
      <!--header-->
      <div class="background-custom display-5 p-4 mt-4">Select your region</div>

      <!--Western Hemisphere container-->
      <div
        class="background-custom d-flex flex-column w-90 mx-auto p-3 mt-4 flex-grow-1"
      >
        <!--Title-->
        <div class="align-self-center">
          <p>Western Hemisphere</p>
        </div>

        <!--images-->
        <div class="d-flex justify-content-around">
          <img
            src="/images/region_selection/canada.png"
            class="flag-img-custom-1"
          />
          <img
            src="/images/region_selection/new-zealand.png"
            class="flag-img-custom-1"
          />
        </div>

        <!--button-->
        <div class="align-self-end">
          <button
            id="westernHemisphereBtn"
            type="button"
            class="btn btn-primary"
          >
            Select
          </button>
        </div>
      </div>

      <!--Eastern Hemisphere container-->
      <div
        class="background-custom d-flex flex-column w-90 mx-auto p-3 mt-4 flex-grow-1"
      >
        <!--Title-->
        <div class="align-self-center">
          <p>Eastern Hemisphere</p>
        </div>

        <!--images-->
        <div>
          <div class="d-flex justify-content-around">
            <img
              src="./images/region_selection/belgium.png"
              class="flag-img-custom-2"
            />
            <img
              src="./images/region_selection/Egypt.png"
              class="flag-img-custom-2"
            />
          </div>

          <div class="d-flex justify-content-around">
            <img
              src="./images/region_selection/qatar.png"
              class="flag-img-custom-2"
            />
            <img
              src="./images/region_selection/switzerland.png"
              class="flag-img-custom-2"
            />
          </div>
        </div>

        <!--button-->
        <div class="align-self-end">
          <button
            id="easternHemisphereBtn"
            type="button"
            class="btn btn-primary"
          >
            Select
          </button>
        </div>
      </div>
    </div>

    <!--Footer Icons and Buttons-->
    <div class="fixed-bottom">
      <footer class="app-footer navbar-custom">
        <!--Home Icon | home.png-->
        <a class="footer-icon-link" href="#" aria-label="Explore">
          <img class="footer-icon" src="images/home.png" alt="Profile icon" />
        </a>

        <!--Chat Icon | chat.png-->
        <a class="footer-icon-link" href="#" aria-label="Saved">
          <img class="footer-icon" src="images/chat.png" alt="Profile icon" />
        </a>

        <!--Account Icon | user.png-->
        <a class="footer-icon-link" href="#" aria-label="Profile">
          <img class="footer-icon" src="images/user.png" alt="Profile icon" />
        </a>
      </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/region.js"></script>
  </body>
</html>
